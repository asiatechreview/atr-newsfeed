<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Asia Tech Review's rolling feed of concise Asia tech news updates.">
  <title>Asia Tech Review</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page">
    <header>
      <h1>Asia Tech Review</h1>
      <p class="tagline">Keeping up with Asia news</p>
    </header>

    <main>
      <p id="feed-status" class="status">Loading news links...</p>
      <section id="feed" aria-label="Newsfeed">
        <div class="feed" id="feed-list" aria-live="polite"></div>
      </section>
    </main>

    <footer>
      <p>Updated from ATR Daily.</p>
    </footer>
  </div>

  <template id="date-template">
    <p class="date"></p>
  </template>

  <template id="item-template">
    <article>
      <p class="blurb"></p>
    </article>
  </template>

  <script src="/app.js" type="module"></script>
</body>
</html>
