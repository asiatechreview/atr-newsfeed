<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asia Tech Review</title>
  <link rel="stylesheet" href="/styles.css?v=20260716-pagination-window">
</head>
<body>
  <div class="page">
    <header class="masthead">
      <h1><a href="/" aria-label="Asia Tech Review homepage">Asia Tech Review</a></h1>
      <p>Rolling Asia tech news links from Asia Tech Review.</p>
    </header>

    <main>
      <nav id="archive-nav" class="archive" aria-label="Recent dates"></nav>
      <form id="search-form" class="search" role="search">
        <input id="search-input" name="q" type="search" autocomplete="off" placeholder="Search" aria-label="Search">
      </form>
      <p id="feed-status" class="status" aria-live="polite">Loading news links...</p>

      <section id="feed-list" class="feed" aria-label="Asia Tech Review feed"></section>
      <nav id="pagination" class="pagination" aria-label="News link pages"></nav>
    </main>

    <footer>
      Updated from ATR news links.
    </footer>
  </div>

  <template id="date-template">
    <p class="date"></p>
  </template>

  <template id="item-template">
    <article class="item">
      <p class="blurb"></p>
      <p class="tags"></p>
    </article>
  </template>

  <script src="/app.js?v=20260717-no-first-share" defer></script>
</body>
</html>
