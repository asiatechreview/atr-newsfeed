<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asia Tech Review</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page">
    <header class="masthead">
      <h1>Asia Tech Review</h1>
      <p>Keeping up with Asia news</p>
    </header>

    <main>
      <p id="feed-status" class="status">
        Sample data shown. Replace SHEET_CSV_URL in index.html with your published Google Sheet CSV link.
      </p>

      <section id="feed-list" class="feed" aria-label="Asia Tech Review feed"></section>
    </main>

    <footer>
      Updated from Google Sheets.
    </footer>
  </div>

  <template id="date-template">
    <p class="date"></p>
  </template>

  <template id="item-template">
    <article class="item">
      <p class="blurb"></p>
    </article>
  </template>

  <script src="/app.js" defer></script>
</body>
</html>
